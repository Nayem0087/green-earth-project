<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Green Earth Project</title>
    <!-- daisyUi & tailwindCSS -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- css file -->
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main class="w-[95%] mx-auto">
        <h2 class="text-[#4ade80] font-bold text-3xl text-center">Choose Your Treas</h2>

        <div class="grid grid-cols-12 gap-8">
            <!-- categories section -->
            <div class="col-span-3 bg-white card card-body shadow-2xl">
                <h2 class="font-bold text-2xl">Categories</h2>
                <div class="space-y-3">
                    <button class="btn btn-success w-full text-center" id="allTressbtn">All Trees</button>

                    <!-- categories container -->
                    <div id="categoriesContainer" class="space-y-3">
                        <!-- categories will be dynamically loaded here by JS -->
                    </div>
                </div>
            </div>

            <!-- tress section -->
            <div class="col-span-6">
                <div id="treesContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3">
                    <!-- dynamicaly added here --> 
                </div>

                <!-- loading spinner -->
             <div id="loadingSpinner" class="h-[60vh] hidden justify-center items-center">
                <span class="loading loading-spinner loading-xl"></span>
             </div>

            </div>

            <!-- cart section -->
            <div class="bg-white card card-body shadow-2xl col-span-3">
                Cart
            </div>
        </div>
    </main>

    <!-- js file -->
    <script src="./script.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Green Earth Project</title>
    <!-- daisyUi & tailwindCSS -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- css file -->
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main class="w-[90%] mx-auto">
        <h2 class="text-[#4ade80] font-bold text-3xl">Choose Your Treas</h2>

        <div class="grid grid-cols-12 gap-8">
            <!-- categories section -->
            <div class="col-span-3 bg-white card card-body shadow-2xl">
                <h2 class="font-bold text-2xl">Categories</h2>
                <div class="space-y-3">
                    <button class="btn btn-success w-full" id="allTressbtn">All Trees</button>

                    <!-- categories container -->
                    <div id="categoriesContainer" class="space-y-3">
                        <!-- categories will be dynamically loaded here by JS -->
                    </div>
                </div>
            </div>

            <!-- tress section -->
            <div class="bg-amber-300 col-span-6">
                <div id="treesContainer" class="grid grid-cols-1 sm:grid-cols-3">
                    <div class="card  bg-base-100 shadow-sm">
                        <figure>
                            <img src="https://img.daisyui.com/images/stock/photo-1606107557195-0e29a4b5b4aa.webp"
                                alt="Shoes" />
                        </figure>
                        <div class="card-body p-2">
                            <h2 class="card-title">Card Title</h2>
                            <p class="line-clamp-2">A card component has a figure, a body part, and inside body there are title and actions
                                parts</p>

                            <!-- badge -->
                             <div class="badge badge-success">Success</div>
                            <div class="flex justify-between items-center">
                                <h2 class="font-bold text-xl text-[#4ade80]">$5000</h2>
                                <button class="btn btn-primary text-[#4ade80]">Buy Now</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- cart section -->
            <div class="bg-green-300 col-span-3">
                Cart
            </div>
        </div>
    </main>

    <!-- js file -->
    <script src="./script.js"></script>
</body>

</html>
